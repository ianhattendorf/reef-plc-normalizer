---
name: Reef PLC Normalizer

on:
  push:
    paths:
      - .github/workflows/reef-plc-normalizer.yaml
      - reef_plc_normalizer/**
  pull_request:
    paths:
      - .github/workflows/reef-plc-normalizer.yaml
      - reef_plc_normalizer/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ianhattendorf/reef-plc-normalizer
  APP_VERSION: 0.1.0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --manifest-path reef_plc_normalizer/app/Cargo.toml -- --check

      - name: Run tests
        run: cargo test --manifest-path reef_plc_normalizer/app/Cargo.toml --locked

  image:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: reef_plc_normalizer
          platforms: linux/amd64
          push: true
          build-args: |
            BUILD_VERSION=${{ env.APP_VERSION }}
            BUILD_ARCH=amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}
            ${{ env.IMAGE_NAME }}:latest
